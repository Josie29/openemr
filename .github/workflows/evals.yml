name: Agent evals (blocking gate)

# THE WEEK-2 HARD GATE (PRD-week-2.md): "we will introduce a small regression and confirm your CI
# gate fails. If the eval gate does not block the regression, the Week 2 build does not pass." This
# job is that gate — it MUST run on promotion PRs and it MUST fail on regression. Do not disable it
# to save cost; a gate that does not run is not a gate.
#
# The paid eval: makes real Anthropic API calls (agent + judges) and writes a run to Langfuse, so it
# costs money per run. It therefore runs ONLY on release-promotion PRs into main (qa/integration ->
# main; main = prod) and on manual dispatch — NOT on feature -> qa/integration PRs. Free
# deterministic agent tests (pytest/ruff/mypy, incl. the golden-set ground-truth guard) run on every
# PR via agent-tests.yml.
#
# COST: runs the 3-case CI subset (copilot-golden-ci, ~$0.10/run), not the full set
# (copilot-golden-v1, ~$2, on-demand). The three are chosen for ROUTE diversity, not convenience —
# one refusal, one both-workers document+guideline synthesis, one corpus-only retrieval — so a
# regression in any of the graph's three legs trips it. Authoring/verifying all 52 is free; only
# running the graph to score rubrics costs money.
#
# Thresholds live in evals/experiment.py: the four deterministic rubrics sit at 1.0, so a single
# failure across the subset breaches one and raises RegressionError.

on:
  pull_request:
    # Base-branch filter: only PRs targeting main (i.e. qa/integration -> main promotions).
    branches:
      - main
    paths:
      - "agent/**"
      - ".github/workflows/evals.yml"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      # Install the agent package so the experiment script can `import copilot.*` and so the
      # ambient env carries our pinned langfuse (>=4) SDK — hence should_skip_sdk_installation.
      - name: Install agent package
        run: pip install -e ./agent

      - uses: langfuse/experiment-action@377da5adb75223b208b7da05276598ff093aaf48 # v1.0.5
        env:
          # The agent-under-test and the Haiku judges both call Anthropic.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          langfuse_public_key: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          langfuse_secret_key: ${{ secrets.LANGFUSE_SECRET_KEY }}
          langfuse_base_url: ${{ secrets.LANGFUSE_BASE_URL }}
          experiment_path: agent/src/copilot/evals/experiment.py
          # The cheap route-diverse 3-case subset (copilot-golden-v1 is the on-demand full set).
          dataset_name: copilot-golden-ci
          should_skip_sdk_installation: "true"
          # ENFORCING. A rubric below its threshold raises RegressionError and fails the PR.
          should_fail_on_regression: "true"
          # A script error fails too: an eval that could not run has not passed, and a gate that
          # goes green when the harness broke is worse than no gate — it reports safety it never
          # checked.
          should_fail_on_script_error: "true"
          should_comment_on_pr: "true"
          github_token: ${{ github.token }}
